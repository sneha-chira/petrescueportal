{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Report Lost Pet - Pet Rescue Portal{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-danger text-white py-4 border-0">
                <h3 class="card-title mb-0 text-center fw-bold"><i class="fa-solid fa-magnifying-glass me-2"></i>Report Lost Pet</h3>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm fw-bold">Report Lost Pet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
