{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Pet Rescue Portal{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white py-4 border-0">
                <h3 class="card-title mb-0 text-center fw-bold"><i class="fa-solid fa-sign-in-alt me-2"></i>Login</h3>
            </div>
            <div class="card-body p-4 p-md-5">
                <!-- Google Login Button -->
                <div class="d-grid mb-4">
                    <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-outline-primary btn-lg rounded-pill shadow-sm fw-bold">
                        <i class="fab fa-google me-2"></i>Continue with Google
                    </a>
                </div>
                
                <div class="text-center mb-4">
                    <span class="text-muted">or</span>
                </div>
                
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg rounded-pill shadow-sm fw-bold">Login</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
